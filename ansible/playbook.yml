---
- name: Setup FastAPI app on EC2
  hosts: all
  become: yes
  gather_facts: yes

  vars:
    project_path: /home/{{ ansible_user }}/fastapi
    git_repo: "git@github.com:alexGithub202021/fastapi.git"
    docker_compose_file: docker-compose.prod.yml

  tasks:
    # 1. Update apt packages
    - name: Update apt cache and upgrade
      apt:
        update_cache: yes
        upgrade: dist
        force_apt_get: yes

    # 2. Install Docker and Docker Compose via apt
    - name: Install Docker and Docker Compose
      apt:
        name:
          - docker.io
          - docker-compose
        state: present

    - name: Ensure Docker service is running
      systemd:
        name: docker
        state: started
        enabled: yes

    # 3. Add user to Docker group
    - name: Add ansible user to docker group
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes

    # 4. Ensure project directory exists
    - name: Create project directory
      file:
        path: "{{ project_path }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    # 5. Add GitHub host key
    - name: Add GitHub.com SSH host key
      known_hosts:
        name: github.com
        key: "{{ lookup('pipe', 'ssh-keyscan -H github.com 2>/dev/null') }}"
        path: /home/{{ ansible_user }}/.ssh/known_hosts
        state: present

    # 6. Fix permissions of known_hosts file
    - name: Set correct permissions for known_hosts
      file:
        path: /home/{{ ansible_user }}/.ssh/known_hosts
        mode: "0644"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"

    # 7. Clone or update the Git repository
    - name: Clone or update Git repository
      git:
        repo: "{{ git_repo }}"
        dest: "{{ project_path }}"
        version: main
        force: yes
        update: yes
        # accept_hostkey: yes
      environment:
        HOME: /home/{{ ansible_user }}
      become: no

    # 8. Create logs directory inside app
    - name: Create logs directory
      file:
        path: "{{ project_path }}/app/logs"
        state: directory
        mode: "0777"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
      become: yes

    # 9. Run Docker Compose
    - name: Launch Docker Compose
      command: docker-compose -f {{ docker_compose_file }} up -d
      args:
        chdir: "{{ project_path }}"
      environment:
        PATH: "/usr/local/bin:/usr/bin:{{ ansible_env.PATH }}"
      become: yes
