---
- name: Setup FastAPI app on EC2
  hosts: all
  become: yes
  gather_facts: yes

  vars:
    project_path: /home/{{ ansible_user }}/fastapi
    git_repo: "git@github.com:alexGithub202021/fastapi.git"
    docker_compose_file: docker-compose.prod.yml

  tasks:
    - name: Update apt cache and upgrade
      apt:
        update_cache: yes
        upgrade: dist
        force_apt_get: yes

    - name: Install Docker and Docker Compose
      apt:
        name:
          - docker.io
          - docker-compose
        state: present

    - name: Ensure Docker service is running
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add ansible user to docker group
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes

    - name: Create project directory
      file:
        path: "{{ project_path }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    - name: Set .ssh directory permissions
      file:
        path: /home/{{ ansible_user }}/.ssh
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0700"

    - name: Write SSH key from environment
      copy:
        content: "{{ lookup('env','AWS_SSH_KEY') }}"
        dest: /home/{{ ansible_user }}/.ssh/id_rsa
        mode: "0600"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
      when: lookup('env','AWS_SSH_KEY', default='') != ''

    - name: Add GitHub.com SSH host key
      known_hosts:
        name: github.com
        key: "{{ lookup('pipe', 'ssh-keyscan -H github.com 2>/dev/null') }}"
        path: /home/{{ ansible_user }}/.ssh/known_hosts
        state: present

    - name: Set correct permissions for known_hosts
      file:
        path: /home/{{ ansible_user }}/.ssh/known_hosts
        mode: "0644"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"

    - name: Clone or update Git repository
      git:
        repo: "{{ git_repo }}"
        dest: "{{ project_path }}"
        version: main
        force: yes
        update: yes
        # accept_hostkey: yes
      environment:
        HOME: /home/{{ ansible_user }}

    - name: Create logs directory
      file:
        path: "{{ project_path }}/app/logs"
        state: directory
        mode: "0777"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"

    - name: Launch Docker Compose
      command: docker-compose -f {{ docker_compose_file }} up -d
      args:
        chdir: "{{ project_path }}"
      environment:
        PATH: "/usr/local/bin:/usr/bin:{{ ansible_env.PATH }}"
