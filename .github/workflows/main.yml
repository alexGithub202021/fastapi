name: Test and deploy

on:
  push:
    branches: ["main"]

jobs:
  UT:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12.12"

      - run: pip install poetry
      - run: cd app
      - run: poetry install --no-root
      - run: poetry run pytest -v
